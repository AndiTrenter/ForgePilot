version: '3.8'

# ForgePilot - Docker Compose für lokales Bauen
# Für Unraid mit vorgebauten Images: docker-compose.unraid.yml verwenden

services:
  mongodb:
    image: mongo:4.4
    container_name: forgepilot-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - forgepilot-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forgepilot-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # MongoDB (im Docker-Netzwerk heißt der Service 'mongodb')
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=forgepilot
      - CORS_ORIGINS=*
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Ollama Konfiguration
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
    volumes:
      - workspaces:/app/workspaces
    ports:
      - "8001:8001"
    networks:
      - forgepilot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forgepilot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - forgepilot-network

networks:
  forgepilot-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  workspaces:
    driver: local
