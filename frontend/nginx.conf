server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle React Router - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy - Routes all /api requests to backend
    # Der Backend-Service heißt in docker-compose.unraid.yml "backend" (nicht "forgepilot-backend")
    # Der Container-Name ist "forgepilot-backend", aber der Service-Name ist "backend"
    location /api/ {
        # Für Docker Compose: Service-Name ist "backend"
        proxy_pass http://backend:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts für langlaufende Requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # SSE support für Streaming-Responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint für Container-Orchestrierung
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
