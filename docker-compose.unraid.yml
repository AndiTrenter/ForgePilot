version: '3.8'

# ForgePilot für Unraid - Mit Auto-Update Support
# GitHub Repository: https://github.com/AndiTrenter/ForgePilot

services:
  mongodb:
    image: mongo:4.4
    container_name: forgepilot-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - forgepilot-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/anditrenter/forgepilot/forgepilot-backend:latest
    container_name: forgepilot-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=forgepilot
      - CORS_ORIGINS=*
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
    volumes:
      - workspaces:/app/workspaces
    ports:
      - "8001:8001"
    networks:
      - forgepilot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/anditrenter/forgepilot/forgepilot-frontend:latest
    container_name: forgepilot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - forgepilot-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Updater Service - Führt automatische Updates durch
  updater:
    image: docker:24-cli
    container_name: forgepilot-updater
    restart: unless-stopped
    volumes:
      # Docker Socket für Container-Kontrolle
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspaces für Trigger-Datei
      - workspaces:/app/workspaces
      # Compose-Datei für Updates
      - .:/app/forgepilot:ro
    working_dir: /app/forgepilot
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "ForgePilot Updater gestartet"
        TRIGGER_FILE="/app/workspaces/.update_trigger"
        
        while true; do
          if [ -f "$$TRIGGER_FILE" ]; then
            echo "Update-Trigger erkannt!"
            echo "[1/4] Lade neue Images..."
            docker pull ghcr.io/anditrenter/forgepilot/forgepilot-backend:latest
            docker pull ghcr.io/anditrenter/forgepilot/forgepilot-frontend:latest
            
            echo "[2/4] Stoppe alte Container..."
            docker stop forgepilot-frontend forgepilot-backend || true
            
            echo "[3/4] Entferne alte Container..."
            docker rm forgepilot-frontend forgepilot-backend || true
            
            echo "[4/4] Starte neue Container..."
            docker-compose -f /app/forgepilot/docker-compose.unraid.yml up -d backend frontend
            
            echo "Update abgeschlossen!"
            rm -f "$$TRIGGER_FILE"
            
            # Alte Images aufräumen
            docker image prune -f
          fi
          sleep 5
        done
    networks:
      - forgepilot-network

networks:
  forgepilot-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  workspaces:
    driver: local
