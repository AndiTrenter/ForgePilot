version: '3.8'

# ForgePilot für Unraid - Nutzt vorgebaute Images von GitHub Container Registry
# Ersetze YOUR_GITHUB_USERNAME mit deinem GitHub Benutzernamen

services:
  mongodb:
    image: mongo:4.4
    container_name: forgepilot-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - forgepilot-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/forgepilot/forgepilot-backend:latest
    container_name: forgepilot-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=forgepilot
      - CORS_ORIGINS=*
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - workspaces:/app/workspaces
    ports:
      - "8001:8001"
    networks:
      - forgepilot-network

  frontend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/forgepilot/forgepilot-frontend:latest
    container_name: forgepilot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    ports:
      - "3000:80"
    networks:
      - forgepilot-network

networks:
  forgepilot-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  workspaces:
    driver: local
